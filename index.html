<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akanksha | Portfolio</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0b0f19;
  color: white;
  overflow: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(
    rgba(11, 15, 25, 0.85),
    rgba(11, 15, 25, 0.95)
  );
  z-index: -1;
}

  
/* Logo */
.logo {
  position: absolute;
  top: 20px;
  left: 30px;
  font-weight: 600;
  font-size: 18px;
}

/* Center Content */
.content {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Glass Card */
.glass {
  position: relative;
  padding: 40px 60px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}

/* Glow Effect */
.glass::before {
  content: "";
  position: absolute;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(124,131,255,0.3), transparent);
  top: -50px;
  right: -50px;
  filter: blur(80px);
  z-index: -1;
}

/* Text */
.glass h1 {
  font-size: 42px;
  font-weight: 600;
}

.role {
  margin-top: 10px;
  color: #7c83ff;
  font-size: 18px;
}

/* Buttons */
.btn {
  padding: 10px 22px;
  margin: 12px 8px 0;
  border-radius: 25px;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s ease;
  display: inline-block;
}

.primary {
  background: linear-gradient(135deg, #6366f1, #7c83ff);
  color: white;
}

.secondary {
  border: 1px solid #6366f1;
  color: #6366f1;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(99,102,241,0.4);
}

/* Canvas Background */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -2;
}
</style>
</head>

<body>

<div class="logo">Akanksha</div>

<canvas id="bg"></canvas>

<div class="hero">
  <div class="hero-left">
    <h1>Akanksha Srivastava</h1>
    <p class="role">Machine Learning Engineer</p>
    <p class="desc">
      Turning data into intelligent solutions 🚀
    </p>

    <div class="buttons">
      <a href="#" class="btn primary">View Projects</a>
      <a href="#" class="btn secondary">Contact Me</a>
    </div>
  </div>

  <div class="hero-right">
    <img src="your-image.jpg" alt="profile">
  </div>
</div>


  
<script>
// Particle Background
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = 2;
    this.speedX = Math.random() * 0.5 - 0.25;
    this.speedY = Math.random() * 0.5 - 0.25;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;

    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
  }

  draw() {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function init() {
  particlesArray = [];
  for (let i = 0; i < 80; i++) {
    particlesArray.push(new Particle());
  }
}

function connect() {
  for (let a = 0; a < particlesArray.length; a++) {
    for (let b = a; b < particlesArray.length; b++) {
      let dx = particlesArray[a].x - particlesArray[b].x;
      let dy = particlesArray[a].y - particlesArray[b].y;
      let distance = dx * dx + dy * dy;

      if (distance < 12000) {
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particlesArray.forEach(p => {
    p.update();
    p.draw();
  });

  connect();
  requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  init();
});
</script>

</body>
</html>
