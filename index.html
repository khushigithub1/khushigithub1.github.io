<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akanksha Srivastava</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #0a0a0a;
  color: #e5e5e5;
  scroll-behavior: smooth;
}

/* PARTICLES (SUBTLE) */
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: rgba(10,10,10,0.6);
  backdrop-filter: blur(10px);
}

nav a {
  color: #aaa;
  margin-left: 20px;
  text-decoration: none;
}

nav a:hover { color: white; }

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-box {
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  text-align: center;
}

.hero h1 {
  font-size: 55px;
}

#typing {
  margin-top: 10px;
  color: #6366f1;
}

/* SECTION */
section {
  padding: 100px 80px;
}

/* PROJECT GRID */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap: 25px;
}

.card {
  padding: 25px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  background: rgba(255,255,255,0.08);
}

/* BUTTON */
.btn {
  display:inline-block;
  margin-top:10px;
  color:#6366f1;
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  color:#777;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<!-- NAV -->
<nav>
  <div><b>Akanksha</b></div>
  <div>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-box">
    <h1>Akanksha Srivastava</h1>
    <p id="typing"></p>
  </div>
</div>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2><br>

  <div class="projects">
    <div class="card">
      <h3>Telecom Churn Prediction</h3>
      <p>92% accuracy ML model predicting churn.</p>
      <a href="#" class="btn">View →</a>
    </div>

    <div class="card">
      <h3>Upcoming Projects</h3>
      <p>Working on advanced ML & deployment.</p>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>LinkedIn / GitHub</p>
</section>

<footer>
  <p>© 2026 Akanksha</p>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
// SUBTLE PARTICLES
particlesJS("particles-js", {
  particles: {
    number: { value: 50 },
    size: { value: 2 },
    move: { speed: 1 }
  }
});

// TYPING
const text = ["Data Science Enthusiast", "Machine Learning Learner"];
let i=0,j=0,current="",del=false;

function type(){
  current=text[i];
  document.getElementById("typing").innerHTML=current.substring(0,j);
  if(!del){ j++; if(j>current.length){ del=true; setTimeout(type,1000); return; } }
  else{ j--; if(j<0){ del=false; i=(i+1)%text.length; } }
  setTimeout(type,del?40:80);
}
type();
</script>

</body>
</html>
