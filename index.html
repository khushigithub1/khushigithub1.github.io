<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akanksha Srivastava | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  color: white;
  overflow-x: hidden;
}

/* PARTICLE BACKGROUND */
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0f172a;
  z-index: -1;
}

/* NAVBAR */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  text-align: center;
  padding: 15px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

nav a {
  color: #cbd5f5;
  margin: 0 15px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* GLASS CARD */
.glass {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  text-align: center;
}

/* TYPING */
#typing {
  color: #6366f1;
  font-size: 22px;
}

/* SECTIONS */
section {
  padding: 80px 20px;
  text-align: center;
}

/* PROJECT */
.project {
  background: rgba(255,255,255,0.1);
  margin: 20px auto;
  padding: 20px;
  max-width: 400px;
  border-radius: 15px;
  transition: 0.3s;
}

.project:hover {
  transform: scale(1.05);
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 10px 20px;
  background: #6366f1;
  border-radius: 20px;
  text-decoration: none;
  color: white;
}

</style>
</head>

<body>

<div id="particles-js"></div>

<!-- NAVBAR -->
<nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="glass">
    <h1>Akanksha Srivastava</h1>
    <p id="typing"></p>
  </div>
</div>

<!-- ABOUT -->
<section id="about">
  <h2>About Me</h2>
  <p>Passionate Data Science Enthusiast building ML projects.</p>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <div class="project">
    <h3>Telecom Churn Prediction</h3>
    <p>92% accuracy ML model</p>
    <a href="#" class="btn">View Project</a>
  </div>

</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <a href="https://www.linkedin.com/in/akanksha-srivastava-20a43623b/" class="btn">LinkedIn</a>
</section>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
// PARTICLES
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 2 }
  }
});

// TYPING EFFECT
const text = ["Data Science Enthusiast", "Machine Learning Learner", "Future Data Scientist"];
let i = 0, j = 0, current = "", isDeleting = false;

function type() {
  current = text[i];
  if (!isDeleting) {
    document.getElementById("typing").innerHTML = current.substring(0, j++);
    if (j > current.length) { isDeleting = true; setTimeout(type, 1000); return; }
  } else {
    document.getElementById("typing").innerHTML = current.substring(0, j--);
    if (j < 0) { isDeleting = false; i = (i + 1) % text.length; }
  }
  setTimeout(type, isDeleting ? 50 : 100);
}
type();
</script>

</body>
</html>
